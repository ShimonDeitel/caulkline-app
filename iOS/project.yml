name: Caulkline
options:
  bundleIdPrefix: com.shimondeitel.caulkline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Caulkline:
    type: application
    platform: iOS
    sources:
      - path: Caulkline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.caulkline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Caulkline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CaulklineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CaulklineTests
      - path: Caulkline.storekit
    dependencies:
      - target: Caulkline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.caulkline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CaulklineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CaulklineUITests
    dependencies:
      - target: Caulkline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.caulkline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Caulkline:
    build:
      targets:
        Caulkline: all
        CaulklineTests: [test]
        CaulklineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Caulkline.storekit
    test:
      config: Debug
      storeKitConfiguration: Caulkline.storekit
      targets:
        - CaulklineTests
        - CaulklineUITests
    archive:
      config: Release
